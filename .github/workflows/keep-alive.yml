name: Keep Render Alive

on:
  schedule:
    - cron: "*/14 * * * *"  # Every 14 minutes (Render sleeps after 15 min)
  workflow_dispatch:        # Manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: curl -fsS "${{ secrets.BACKEND_URL }}/health" || true
